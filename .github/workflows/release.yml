name: Release

# Tag a release (e.g. `git tag v0.3.0 && git push origin v0.3.0`) to run the
# test suite and publish a Docker image to GHCR. The image version comes from
# the tag, not package.json.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  # Bump package.json on main to match the tag (the tagged commit itself keeps
  # its version; this keeps the repo's declared version honest going forward).
  version:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Bump package.json to ${{ github.ref_name }}
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Sync .claude-plugin/plugin.json to the same version
        run: |
          node -e '
            const fs = require("node:fs");
            const { version } = require("./package.json");
            const path = "./.claude-plugin/plugin.json";
            const plugin = JSON.parse(fs.readFileSync(path, "utf8"));
            plugin.version = version;
            fs.writeFileSync(path, JSON.stringify(plugin, null, 2) + "\n");
          '
      - name: Commit the bump to main
        run: |
          if git diff --quiet; then
            echo "package.json already at ${GITHUB_REF_NAME#v}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release ${GITHUB_REF_NAME} [skip ci]"
          git push origin main

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
