name: Release

# Tag a release (e.g. `git tag v0.3.0 && git push origin v0.3.0`) to run the
# test suite and publish the npm package + Docker image. Both take their
# version from the tag, not package.json.
#
# Actions are pinned to commit SHAs (not tags) so a compromised action tag
# can't inject code into the release path; Dependabot keeps the pins fresh.
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml
    # ci.yml's job requests code-quality: write (coverage upload); a reusable
    # workflow may not request more than its caller grants, so grant it here
    # even though the upload step skips itself on tag refs.
    permissions:
      contents: read
      code-quality: write

  # Bump package.json on main to match the tag (the tagged commit itself keeps
  # its version; this keeps the repo's declared version honest going forward).
  version:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Bump package.json to ${{ github.ref_name }}
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Sync .claude-plugin/plugin.json to the same version
        run: |
          node -e '
            const fs = require("node:fs");
            const { version } = require("./package.json");
            const path = "./.claude-plugin/plugin.json";
            const plugin = JSON.parse(fs.readFileSync(path, "utf8"));
            plugin.version = version;
            fs.writeFileSync(path, JSON.stringify(plugin, null, 2) + "\n");
          '
      - name: Commit the bump to main
        run: |
          if git diff --quiet; then
            echo "package.json already at ${GITHUB_REF_NAME#v}; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release ${GITHUB_REF_NAME} [skip ci]"
          git push origin main

  # Publish to npm with provenance. Auth is OIDC trusted publishing (no
  # long-lived secret) once the trusted publisher is configured on npmjs.com;
  # an NPM_TOKEN secret, when present, is used instead — that path exists only
  # to bootstrap the very first release (trusted publishers can only be
  # configured on packages that already exist). Delete the secret after.
  npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: trusted publishing + provenance attestation
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Node 24 bundles npm >= 11.6, which covers trusted publishing's
      # npm >= 11.5.1 floor without an unpinned `npm install -g npm`.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      # --ignore-scripts: no dependency postinstall runs in the job that holds
      # publish credentials. Our own lifecycle scripts still run on publish.
      - run: npm ci --ignore-scripts

      # Supply-chain gates, in order: registry signatures/attestations of the
      # installed tree, then known vulns in the deps we actually ship.
      - run: npm audit signatures
      - run: npm audit --omit=dev --audit-level=high

      - name: Version from tag (also inside the tarball's plugin.json)
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          node -e '
            const fs = require("node:fs");
            const { version } = require("./package.json");
            const path = "./.claude-plugin/plugin.json";
            const plugin = JSON.parse(fs.readFileSync(path, "utf8"));
            plugin.version = version;
            fs.writeFileSync(path, JSON.stringify(plugin, null, 2) + "\n");
          '

      # prepublishOnly re-runs typecheck + tests + the tarball allowlist guard
      # at the moment of publish; publishConfig adds --provenance + public.
      - name: Publish (OIDC trusted publishing)
        if: env.HAS_NPM_TOKEN != 'true'
        run: npm publish

      - name: Publish (bootstrap token — first release only)
        if: env.HAS_NPM_TOKEN == 'true'
        run: |
          echo '//registry.npmjs.org/:_authToken=${NPM_TOKEN}' > "$RUNNER_TEMP/.npmrc"
          NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/.npmrc" npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
