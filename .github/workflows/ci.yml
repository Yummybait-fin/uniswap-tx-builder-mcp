name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Reusable: release.yml calls this so a tag re-runs the exact same checks.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm test
      # Build + assert the npm tarball matches the ship allowlist, so a
      # packaging regression fails the PR, not the release.
      - run: npm run verify:pack
