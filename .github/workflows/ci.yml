name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Reusable: release.yml calls this so a tag re-runs the exact same checks.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write # coverage upload
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run typecheck
      - run: npm run test:coverage
      # Feeds the code-quality coverage dashboard + PR summaries. Skipped where
      # the token can't write code-quality: fork/dependabot PRs and release
      # runs (release.yml calls this workflow with contents: read only).
      - uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        if: github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
        with:
          file: coverage/cobertura-coverage.xml
          language: TypeScript
          label: code-coverage/vitest
      # Build + assert the npm tarball matches the ship allowlist, so a
      # packaging regression fails the PR, not the release.
      - run: npm run verify:pack
