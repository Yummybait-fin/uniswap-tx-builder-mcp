# Keeps the SHA-pinned actions, npm deps, and base images fresh — the flip
# side of pinning everything in the release path.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
